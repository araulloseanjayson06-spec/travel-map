<!DOCTYPE html>
<html>
<head>
<title>USA</title>
<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#c9b299;
    text-align:center;
}

h1{
    margin-top:40px;
    color:#3e2a1f;
}

p.main{
    width:70%;
    margin:auto;
    margin-bottom:40px;
    color:#3e2a1f;
}

/* Images container */
.images{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.image-card{
    width:300px;
    text-align:center;
}

.image-card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:6px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    margin-bottom:10px;
    cursor:pointer;
    transition: transform 0.3s;
}

.image-card img:hover{
    transform: scale(1.05);
}

/* Lightbox */
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:100;
}

.lightbox img{
    max-width:80%;
    max-height:80%;
    border-radius:8px;
}

.lightbox:target{
    display:flex;
}

/* Description under image */
.image-card p{
    font-size:14px;
    color:#3e2a1f;
}

.back{
    margin-top:40px;
    display:inline-block;
    padding:10px 20px;
    background:#3e2a1f;
    color:white;
    text-decoration:none;
}
</style>
</head>
<body>

<h1>Egypt</h1>

<p class="main">
I want to visit Egypt because of its ancient history, pyramids, and rich cultural heritage.
</p>

<div class="images">

    <!-- Image 1 -->
    <div class="image-card">
        <a href="#img1">
            <img src="Egypt/karnak temple.jpg" alt="New York">
        </a>
        <p>Karnak Temple</p>
    </div>

    <!-- Image 2 -->
    <div class="image-card">
        <a href="#img2">
            <img src="Egypt/pyramid of giza.jpg" alt="Grand Canyon">
        </a>
        <p>Pyramid of Giza</p>
    </div>

    <!-- Image 3 -->
    <div class="image-card">
        <a href="#img3">
            <img src="Egypt/valley of kings.jpg" alt="Disneyland">
        </a>
        <p>Valley of Kings</p>
    </div>

</div>

<!-- Lightboxes -->
<div id="img1" class="lightbox">
    <a href="#"><img src="Egypt/karnak temple.jpg"></a>
</div>

<div id="img2" class="lightbox">
    <a href="#"><img src="Egypt/pyramid of giza.jpg"></a>
</div>

<div id="img3" class="lightbox">
    <a href="#"><img src="Egypt/valley of kings.jpg"></a>
</div>

<a href="index.html" class="back">← Back</a>

</body>
</html>
